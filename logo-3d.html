
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElefanteLab - Logo 3D Animado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            perspective: 1000px;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            align-items: center;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        .elephant {
            font-size: 8rem;
            margin-right: 1rem;
            transform-style: preserve-3d;
            animation: spin 8s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .text-container {
            transform-style: preserve-3d;
            position: relative;
        }

        .text-3d {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-transform: lowercase;
            position: relative;
            transform-style: preserve-3d;
            animation: pulse 4s ease-in-out infinite;
        }

        .text-3d::before {
            content: 'elefantelab';
            position: absolute;
            top: 0;
            left: 0;
            color: #FF6B6B;
            transform: translateZ(-20px) translateY(5px) translateX(5px);
            z-index: -1;
            opacity: 0.7;
        }

        .text-3d::after {
            content: 'elefantelab';
            position: absolute;
            top: 0;
            left: 0;
            color: #4ECDC4;
            transform: translateZ(-40px) translateY(10px) translateX(10px);
            z-index: -2;
            opacity: 0.5;
        }

        .lab-highlight {
            color: #FFE66D;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: particleFloat 8s linear infinite;
        }

        .tagline {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            text-align: center;
            animation: fadeInUp 3s ease-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-30px) rotateX(5deg); }
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) rotateX(0deg); }
            50% { transform: scale(1.05) rotateX(10deg); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px #FFE66D, 0 0 20px #FFE66D; }
            100% { text-shadow: 0 0 20px #FFE66D, 0 0 30px #FFE66D, 0 0 40px #FFE66D; }
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) translateX(0px) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .elephant {
                font-size: 4rem;
            }
            .text-3d {
                font-size: 2rem;
            }
            .tagline {
                font-size: 1rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="logo-container">
        <div class="elephant">🐘</div>
        <div class="text-container">
            <div class="text-3d">
                elefante<span class="lab-highlight">lab</span>
            </div>
        </div>
    </div>

    <div class="tagline">
        Creamos apps y plataformas que hacen crecer tu negocio
    </div>

    <script>
        // Crear partículas animadas
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Posición aleatoria
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 5) + 's';
                
                particlesContainer.appendChild(particle);
            }
        }

        // Crear efecto de cursor interactivo
        document.addEventListener('mousemove', (e) => {
            const logoContainer = document.querySelector('.logo-container');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            logoContainer.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Resetear posición cuando el mouse sale de la ventana
        document.addEventListener('mouseleave', () => {
            const logoContainer = document.querySelector('.logo-container');
            logoContainer.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        // Inicializar partículas
        createParticles();

        // Agregar efecto de click al logo
        document.querySelector('.logo-container').addEventListener('click', () => {
            const container = document.querySelector('.logo-container');
            container.style.animation = 'none';
            container.style.transform = 'scale(1.2) rotateY(360deg)';
            
            setTimeout(() => {
                container.style.animation = 'float 6s ease-in-out infinite';
                container.style.transform = 'scale(1)';
            }, 1000);
        });
    </script>
</body>
</html>
