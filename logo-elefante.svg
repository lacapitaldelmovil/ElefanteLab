<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="elefanteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E8E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>
  
  <!-- Círculo de fondo blanco -->
  <circle cx="30" cy="40" r="25" fill="white" filter="url(#shadow)"/>
  
  <!-- Cuerpo del elefante -->
  <ellipse cx="30" cy="42" rx="12" ry="8" fill="url(#elefanteGradient)"/>
  
  <!-- Cabeza del elefante -->
  <circle cx="30" cy="35" r="8" fill="url(#elefanteGradient)"/>
  
  <!-- Trompa del elefante -->
  <path d="M 22 35 Q 18 38 20 42 Q 22 40 24 38" stroke="url(#elefanteGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Orejas -->
  <ellipse cx="26" cy="32" rx="4" ry="6" fill="url(#elefanteGradient)" transform="rotate(-20 26 32)"/>
  <ellipse cx="34" cy="32" rx="4" ry="6" fill="url(#elefanteGradient)" transform="rotate(20 34 32)"/>
  
  <!-- Ojos -->
  <circle cx="28" cy="33" r="1.5" fill="white"/>
  <circle cx="32" cy="33" r="1.5" fill="white"/>
  <circle cx="28" cy="33" r="0.8" fill="#333"/>
  <circle cx="32" cy="33" r="0.8" fill="#333"/>
  
  <!-- Colmillos -->
  <ellipse cx="27" cy="37" rx="1" ry="2" fill="white"/>
  <ellipse cx="33" cy="37" rx="1" ry="2" fill="white"/>
  
  <!-- Patas -->
  <rect x="24" y="48" width="3" height="6" fill="url(#elefanteGradient)" rx="1.5"/>
  <rect x="28" y="48" width="3" height="6" fill="url(#elefanteGradient)" rx="1.5"/>
  <rect x="32" y="48" width="3" height="6" fill="url(#elefanteGradient)" rx="1.5"/>
  <rect x="36" y="48" width="3" height="6" fill="url(#elefanteGradient)" rx="1.5"/>
  
  <!-- Texto "Elefante Lab" -->
  <text x="70" y="35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">
    Elefante
  </text>
  <text x="70" y="52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="url(#elefanteGradient)">
    Lab
  </text>
</svg>